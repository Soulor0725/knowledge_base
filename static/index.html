<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo</title>
    <link href="/static/vendor/css/inter.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/vendor/css/easymde.min.css">
    <link rel="stylesheet" href="/static/vendor/css/font-awesome.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        
        /* EasyMDE 编辑器样式 */
        .CodeMirror {
            background: rgba(30, 41, 59, 0.9) !important;
            color: #e2e8f0 !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
            border-radius: 10px !important;
        }
        
        .CodeMirror-cursor {
            border-left: 2px solid #60a5fa !important;
        }
        
        .CodeMirror-selected {
            background: rgba(96, 165, 250, 0.2) !important;
        }
        
        .CodeMirror-line {
            color: #e2e8f0 !important;
        }
        
        .cm-header {
            color: #60a5fa !important;
            font-weight: 600 !important;
        }
        
        .cm-quote {
            color: #34d399 !important;
            font-style: italic !important;
        }
        
        /* CodeMirror 语法高亮 */
        .CodeMirror {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important;
            font-size: 14px !important;
            line-height: 1.6 !important;
        }
        
        /* 关键字 */
        .CodeMirror .cm-keyword, .CodeMirror span.cm-keyword {
            color: #f472b6 !important;
            font-weight: 600 !important;
        }
        
        /* 字符串 */
        .CodeMirror .cm-string, .CodeMirror span.cm-string {
            color: #fbbf24 !important;
        }
        
        /* 注释 */
        .CodeMirror .cm-comment, .CodeMirror span.cm-comment {
            color: #64748b !important;
            font-style: italic !important;
        }
        
        /* 数字 */
        .CodeMirror .cm-number, .CodeMirror span.cm-number {
            color: #34d399 !important;
        }
        
        /* 函数名 */
        .CodeMirror .cm-def, .CodeMirror span.cm-def, .CodeMirror span.cm-function {
            color: #60a5fa !important;
        }
        
        /* 变量 */
        .CodeMirror .cm-variable, .CodeMirror span.cm-variable {
            color: #e2e8f0 !important;
        }
        
        /* 操作符 */
        .CodeMirror .cm-operator, .CodeMirror span.cm-operator {
            color: #cbd5e1 !important;
        }
        
        /* 括号 */
        .CodeMirror .cm-punctuation, .CodeMirror span.cm-punctuation {
            color: #94a3b8 !important;
        }
        
        /* 属性 */
        .CodeMirror .cm-property, .CodeMirror span.cm-property {
            color: #60a5fa !important;
        }
        
        /* Python特定 */
        .CodeMirror .cm-atom, .CodeMirror span.cm-atom {
            color: #34d399 !important;
        }
        

        
        /* 行号 */
        .CodeMirror .CodeMirror-gutters {
            background: rgba(30, 41, 59, 0.9) !important;
            border-right: 1px solid rgba(148, 163, 184, 0.2) !important;
        }
        
        .CodeMirror .CodeMirror-linenumber {
            color: #64748b !important;
            font-size: 12px !important;
        }
        /* Article list - increase font size and spacing for better readability */
        .main-article-header div, .main-article-item div {
            font-size: 14px !important;
        }
        .main-article-item {
            padding: 10px 12px !important;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease !important;
            border-left: 3px solid transparent !important;
        }
        .main-article-item:hover {
            background: linear-gradient(90deg, rgba(96, 165, 250, 0.12) 0%, rgba(96, 165, 250, 0.04) 100%) !important;
            border-left-color: #60a5fa !important;
            box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.15) !important;
        }
        .main-article-header {
            padding: 10px 12px !important;
        }

        /* ===== 全局通用样式：数据行 hover、操作按钮、空状态、状态标签 ===== */
        .data-row {
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            border-left: 3px solid transparent;
        }
        .data-row:hover {
            background: linear-gradient(90deg, rgba(96, 165, 250, 0.12) 0%, rgba(96, 165, 250, 0.04) 100%) !important;
            border-left-color: #60a5fa !important;
            box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.15);
        }
        .action-icon-btn {
            padding: 6px 10px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: rgba(30, 41, 59, 0.8);
            color: #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .action-icon-btn.edit:hover {
            background: rgba(96, 165, 250, 0.15);
            border-color: rgba(96, 165, 250, 0.5);
            color: #60a5fa;
        }
        .action-icon-btn.delete:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.5);
            color: #f87171;
        }
        .empty-state-card {
            text-align: center;
            padding: 48px 24px;
            color: #64748b;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(148, 163, 184, 0.15);
            border-radius: 12px;
        }
        .empty-state-card i {
            font-size: 40px;
            color: #475569;
            margin-bottom: 12px;
            display: block;
        }
        .empty-state-card p {
            font-size: 14px;
            margin: 4px 0 0;
        }
        .status-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-pill.shipped { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .status-pill.unshipped { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
        /* 分页按钮统一样式 */
        .page-btn {
            padding: 6px 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(30, 41, 59, 0.8);
            color: #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        .page-btn:hover:not(:disabled) {
            background: rgba(96, 165, 250, 0.1);
            border-color: rgba(96, 165, 250, 0.3);
            color: #60a5fa;
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .page-btn.active {
            background: #60a5fa;
            border-color: #60a5fa;
            color: white;
            font-weight: 600;
        }
        /* 底部版权栏 */
        .app-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(148, 163, 184, 0.15);
            color: #94a3b8;
            font-size: 14px;
            z-index: 1000;
        }
        .footer-divider {
            color: rgba(148, 163, 184, 0.4);
            margin: 0 4px;
        }
        
        /* 确保代码块在预览模式中也有高亮 */
        .editor-preview pre {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
            border-radius: 8px !important;
            padding: 16px !important;
            margin: 16px 0 !important;
            overflow: auto !important;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important;
            font-size: 14px !important;
            line-height: 1.6 !important;
        }
        
        .editor-preview code {
            background: rgba(15, 23, 42, 0.6) !important;
            border-radius: 4px !important;
            padding: 2px 6px !important;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important;
            font-size: 14px !important;
        }
        
        /* 预览模式中的代码高亮 */
        .editor-preview pre code {
            background: transparent !important;
            padding: 0 !important;
        }
        
        .editor-preview pre code .keyword {
            color: #f472b6 !important;
            font-weight: 600 !important;
        }
        
        .editor-preview pre code .string {
            color: #fbbf24 !important;
        }
        
        .editor-preview pre code .comment {
            color: #64748b !important;
            font-style: italic !important;
        }
        
        .editor-preview pre code .number {
            color: #34d399 !important;
        }
        
        .editor-preview pre code .function {
            color: #60a5fa !important;
        }
        
        .cm-link {
            color: #f472b6 !important;
            text-decoration: underline !important;
        }
        
        .cm-string {
            color: #fbbf24 !important;
        }
        
        .cm-comment {
            color: #64748b !important;
        }
        
        .cm-code {
            color: #a78bfa !important;
            background: rgba(167, 139, 250, 0.1) !important;
        }
        
        .editor-toolbar {
            background: rgba(30, 41, 59, 0.8) !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
            border-bottom: none !important;
            border-radius: 10px 10px 0 0 !important;
            padding: 10px 16px !important;
        }
        
        .editor-toolbar button {
            color: #94a3b8 !important;
            border: 1px solid transparent !important;
            border-radius: 6px !important;
            padding: 6px 10px !important;
            margin: 0 2px !important;
            transition: all 0.2s ease !important;
        }
        
        .editor-toolbar button:hover {
            background: rgba(255, 255, 255, 0.1) !important;
            color: #60a5fa !important;
            border-color: rgba(96, 165, 250, 0.3) !important;
        }
        
        .editor-toolbar button.active {
            background: rgba(96, 165, 250, 0.2) !important;
            color: #60a5fa !important;
            border-color: rgba(96, 165, 250, 0.5) !important;
        }

        .editor-toolbar .fa-list-ul,
        .editor-toolbar .fa-list-ol {
            font-size: 14px !important;
        }
        
        .editor-statusbar {
            background: rgba(30, 41, 59, 0.8) !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
            border-top: none !important;
            border-radius: 0 0 10px 10px !important;
            color: #94a3b8 !important;
            padding: 6px 16px !important;
        }
        
        .editor-preview {
            background: rgba(30, 41, 59, 0.9) !important;
            color: #e2e8f0 !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
        }
        
        .editor-preview-side {
            background: rgba(30, 41, 59, 0.9) !important;
            color: #e2e8f0 !important;
            border-left: 1px solid rgba(148, 163, 184, 0.2) !important;
        }
        
        .editor-preview pre {
            background: rgba(15, 23, 42, 0.9) !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
            border-radius: 8px !important;
            padding: 16px !important;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important;
            font-size: 14px !important;

            overflow-x: auto !important;
        }
        
        .editor-preview pre code {
            background: transparent !important;
            padding: 0 !important;
            color: inherit !important;
        }
        
        .editor-preview code.language-python .keyword {
            color: #0000ff !important; /* 关键字 - 蓝色 */
        }
        
        .editor-preview code.language-python .string {
            color: #008000 !important; /* 字符串 - 绿色 */
        }
        
        .editor-preview code.language-python .comment {

        }
        
        .editor-preview code.language-python .number {

        }
        
        .editor-preview code.language-python .function {

        }
        
        .editor-preview code.language-python .operator {

        }
        
        .editor-preview code {
            background: rgba(167, 139, 250, 0.1) !important;
            color: #a78bfa !important;
            padding: 2px 6px !important;
            border-radius: 4px !important;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important;
        }
        
        /* 代码块样式 */
        
        /* 代码语法高亮 - 参照博客园样式（仅用于预览） */
        .editor-preview .CodeMirror span.cm-keyword {
            color: #0000ff !important; /* 关键字 - 蓝色 */
        }
        
        .editor-preview .CodeMirror span.cm-string {
            color: #008000 !important; /* 字符串 - 绿色 */
        }
        
        .editor-preview .CodeMirror span.cm-comment {
            color: #808080 !important; /* 注释 - 灰色 */
            font-style: italic !important;
        }
        
        .editor-preview .CodeMirror span.cm-number {
            color: #ff8c00 !important; /* 数字 - 橙色 */
        }
        
        .editor-preview .CodeMirror span.cm-variable {
            color: #000000 !important; /* 变量 - 黑色 */
        }
        
        .editor-preview .CodeMirror span.cm-function {
            color: #000000 !important; /* 函数 - 黑色 */
        }
        
        .editor-preview .CodeMirror span.cm-operator {
            color: #ff8c00 !important; /* 运算符 - 橙色 */
        }
        
        .editor-preview .CodeMirror span.cm-property {

        }
        
        .editor-preview h1,
        .editor-preview h2,
        .editor-preview h3 {
            color: #60a5fa !important;
            margin: 16px 0 8px 0 !important;
        }
        
        .editor-preview blockquote {
            border-left: 4px solid #34d399 !important;
            padding-left: 16px !important;
            margin: 16px 0 !important;
            color: #94a3b8 !important;
            font-style: italic !important;
        }
        
        .editor-preview ul,
        .editor-preview ol {
            margin: 16px 0 !important;
            padding-left: 24px !important;
        }
        
        .editor-preview ol {
            list-style-type: none !important;
        }
        
        .editor-preview li {
            margin: 4px 0 !important;
        }
        
        .editor-preview a {
            color: #60a5fa !important;
            text-decoration: underline !important;
        }
        
        .editor-preview img {
            max-width: 100% !important;
            border-radius: 6px !important;
            margin: 16px 0 !important;
        }

        .header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 32px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            flex-shrink: 0;
        }
        .stats-bar {
            display: flex;
            gap: 12px;
            justify-content: flex-start;
        }
        .stat-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(148, 163, 184, 0.1);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(96, 165, 250, 0.3);
        }
        .stat-item span {
            font-weight: 700;
            color: #60a5fa;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .user-info .btn {
            padding: 12px 24px;
            font-weight: 600;
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.3);
        }
        .user-name {
            color: #f8fafc;
            font-size: 14px;
            font-weight: 600;
        }
        .main-container {
            display: flex;
            max-width: 1600px;
            margin: 24px auto;
            padding: 0 24px;
            gap: 24px;
        }
        .sidebar {
            width: 240px;
            flex-shrink: 0;
        }
        .sidebar-section {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 10px;
        }
        .sidebar-section h3 {
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .add-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.3);
        }
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(96, 165, 250, 0.4);
        }
        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 3px;
            transition: all 0.2s ease;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.1);
            position: relative; /* 添加相对定位 */
            overflow: visible;
        }
        .category-item:hover {
            background: rgba(30, 41, 59, 1);
            border-color: rgba(96, 165, 250, 0.3);
        }
        .category-item.active {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            border: 1px solid rgba(96, 165, 250, 0.3);
        }
        .category-item.active .category-name {
            color: #e2e8f0;
            font-weight: 600;
        }
        .category-item.active .category-dot {
            box-shadow: 0 0 14px currentColor;
        }
        .category-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }
        .category-name {
            font-weight: 500;
            color: #94a3b8;
            font-size: 12px;
        }
        .category-count {
            background: rgba(255,255,255,0.08);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }

        .category-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-actions .btn-sm {
            background: transparent;
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #60a5fa;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .category-actions .btn-sm:hover {
            background: rgba(96, 165, 250, 0.1);
            border-color: rgba(96, 165, 250, 0.5);
        }

        .category-actions .btn-sm i {
            font-size: 10px;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(148, 163, 184, 0.1);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tag:hover {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            border-color: rgba(96, 165, 250, 0.3);
            color: #60a5fa;
        }
        .content-area {
            flex: 1;
            padding-bottom: 40px;
        }
        .toolbar {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .search-box {
            flex: 1;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 14px;
            color: #e2e8f0;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .search-box input::placeholder {
            color: #64748b;
        }
        .search-box input:focus {
            outline: none;
            border-color: rgba(96, 165, 250, 0.5);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.1);
        }
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }
        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;

         * @param {Object} config - 分页配置
         * @param {string} config.containerId - 分页容器 ID
         * @param {number} config.total - 总记录数
         * @param {number} config.currentPage - 当前页码
         * @param {number} config.pageSize - 每页大小
         * @param {number[]} config.pageSizeOptions - 每页大小选项
         * @param {Function} config.onPageChange - 页码变化回调
         * @param {Function} config.onPageSizeChange - 每页大小变化回调
         * @param {string} [config.itemName='条'] - 计量单位名称
         */
        function renderPaginationComponent(config) {
            const { containerId, total, currentPage, pageSize, pageSizeOptions = [5, 10, 15], onPageChange, onPageSizeChange, itemName = '条' } = config;
            const container = document.getElementById(containerId);
            if (!container) return;
            const totalPages = Math.ceil(total / pageSize);
            let html = `<div style="display:flex;align-items:center;gap:8px;margin-right:12px;"><span style="color:#94a3b8;font-size:12px;">每页</span><select onchange="(${onPageSizeChange.name})(this.value)" style="padding:4px 8px;border:1px solid rgba(148,163,184,0.2);border-radius:4px;background:rgba(30,41,59,0.8);color:#cbd5e1;font-size:12px;">`;
            pageSizeOptions.forEach(s => { html += `<option value="${s}" ${pageSize === s ? 'selected' : ''}>${s}</option>`; });
            html += `</select><span style="color:#94a3b8;font-size:12px;">${itemName}</span></div>`;
            if (totalPages > 1) {
                const showPages = 5;
                let startPage = Math.max(1, currentPage - Math.floor(showPages / 2));
                let endPage = Math.min(totalPages, startPage + showPages - 1);
                if (endPage - startPage < showPages - 1) startPage = Math.max(1, endPage - showPages + 1);
                html += `<button onclick="(${onPageChange.name})(1)" class="page-btn" ${currentPage === 1 ? 'disabled' : ''}>首页</button>`;
                html += `<button onclick="(${onPageChange.name})(${currentPage - 1})" class="page-btn" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
                for (let i = startPage; i <= endPage; i++) {
                    html += `<button onclick="(${onPageChange.name})(${i})" class="page-btn ${currentPage === i ? 'active' : ''}">${i}</button>`;
                }
                html += `<button onclick="(${onPageChange.name})(${currentPage + 1})" class="page-btn" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
                html += `<button onclick="(${onPageChange.name})(${totalPages})" class="page-btn" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>`;
            }
            html += `<span style="color:#94a3b8;font-size:12px;margin-left:12px;">共 ${total} ${itemName}，第 ${currentPage}/${totalPages || 1} 页</span>`;
            container.innerHTML = html;

        async function fetchWithTimeout(url, options = {}, timeout = 15000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                return response;
            } catch (err) {
                if (err.name === 'AbortError') {
                    throw new Error('请求超时，请检查网络连接');
                }
                throw err;
            } finally {
                clearTimeout(timer);
            }
        }

        /**
         * 统一API请求封装：自动处理超时、重试、401跳转、错误解析
         * @param {string} url
         * @param {object} options - fetch options
         * @param {number} maxRetries - 最大重试次数（默认2）
         * @param {number} timeout - 超时毫秒（默认15000）
         * @returns {Promise<object>} 解析后的JSON数据
         */
        async function apiRequest(url, options = {}, maxRetries = 2, timeout = 15000) {
            let lastError;
            for (let attempt = 0; attempt <= maxRetries; attempt++) {
                try {
                    const response = await fetchWithTimeout(url, options, timeout);

                    if (response.status === 401) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        window.location.hash = '#/login';
                        throw new Error('登录已过期，请重新登录');
                    }

                    const text = await response.text();
                    let data;
                    try {
                        data = JSON.parse(text);
                    } catch (e) {
                        data = { error: text || '服务器响应格式错误' };
                    }

                    if (!response.ok) {
                        throw new Error(data.error || `请求失败(${response.status})`);
                    }
                    return data;
                } catch (error) {
                    lastError = error;
                    // 不重试的情况：401、403、404、AbortError(超时)
                    if (error.message.includes('登录已过期') ||
                        error.message.includes('请求超时') ||
                        error.message.includes('请求失败(403') ||
                        error.message.includes('请求失败(404')) {
                        break;
                    }
                    if (attempt < maxRetries) {
                        await new Promise(r => setTimeout(r, 1000 * Math.pow(2, attempt)));
                    }
                }
            }
            throw lastError;
        }

                // 修改密码
        async function changePassword(event) {
            event.preventDefault();
            const oldPw = document.getElementById('oldPassword').value;
            const newPw = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmNewPassword').value;

            if (!oldPw || !newPw || !confirmPw) {
                alert('请填写所有密码字段');
                return;
            }
            if (newPw.length < 8) {
                alert('新密码长度至少8位');
                return;
            }
            var hasUpper = false, hasLower = false, hasDigit = false;
            for (var i = 0; i < newPw.length; i++) {
                var c = newPw.charAt(i);
                if (c >= 'A' && c <= 'Z') hasUpper = true;
                else if (c >= 'a' && c <= 'z') hasLower = true;
                else if (c >= '0' && c <= '9') hasDigit = true;
            }
            if (!hasUpper || !hasLower || !hasDigit) {
                alert('新密码必须同时包含大写字母、小写字母和数字');
                return;
            }
            if (newPw !== confirmPw) {
                alert('两次输入的新密码不一致');
                return;
            }
            if (oldPw === newPw) {
                alert('新密码不能与原密码相同');
                return;
            }

            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: JSON.stringify({ old_password: oldPw, new_password: newPw })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || '修改失败');
                }
                alert('密码修改成功');
                document.getElementById('changePasswordForm').reset();
            } catch (error) {
                console.error('修改密码失败:', error);
                alert(error.message);
            }
        }

        async function loadArticles() {
            let url = `${API_URL}/articles`;
            const params = [];
            if (currentCategory) params.push(`category=${encodeURIComponent(currentCategory)}`);
            if (currentTag) params.push(`tag=${encodeURIComponent(currentTag)}`);
            if (currentView === 'favorites') params.push('favorite=true');
            params.push(`page=${currentPage}`);
            params.push(`page_size=${pageSize}`);
            if (params.length) url += '?' + params.join('&');
            try {
                const response = await fetchWithTimeout(url, {
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        // 未授权，重新检查认证状态
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        user = null;
                        checkAuth();
                    }
                    throw new Error('加载文章失败');
                }
                
                const result = await response.json();
                if (!result || !Array.isArray(result.articles)) {
                    throw new Error('接口响应格式错误');
                }
                const articles = result.articles;
                totalArticles = result.total || 0;
                renderArticles(articles);
            } catch (error) {
                console.error('加载文章失败:', error);
                console.error('错误详情:', error.message);

        function formatDate(dateStr) {

            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;

        function showKiwiReportPage() {

                    <div id="kiwiReportStats" style="margin-bottom:20px;"></div>
                    <div id="kiwiReportContent"></div>
                </div>
            `;
            loadKiwiReport();
        }
        
        // 猕猴桃销售报表统计模块
        let kiwiReportData = [];
        let kiwiReportPage = 1;
        let kiwiReportPageSize = 5;
        let kiwiReportTotalPages = 1;
        let kiwiReportTotalCustomers = 0;
        
        async function loadKiwiReport() {
            let data = null;
            try {
                const yearSelect = document.getElementById('kiwiReportYear');
                const year = yearSelect ? yearSelect.value : new Date().getFullYear();
                const response = await fetchWithTimeout(`${API_URL}/kiwi-sales-report?page=${kiwiReportPage}&page_size=${kiwiReportPageSize}&year=${year}`, {
                    headers: getAuthHeaders()
                });
                if (!response.ok) throw new Error('加载报表失败');
                data = await response.json();
                kiwiReportData = data.report || [];
                kiwiReportPage = data.page || 1;
                kiwiReportPageSize = data.page_size || 10;
                kiwiReportTotalPages = data.total_pages || 1;
                kiwiReportTotalCustomers = data.total_customers || 0;
            } catch (error) {
                console.error('加载报表失败:', error);
                kiwiReportData = [];
            }
            // 无论成功失败，都渲染统计和列表（无数据时显示 0 和空列表）
            renderKiwiReportStats(data ? data.summary : null);
            renderKiwiReport();
        }

        function resetKiwiReportYear() {
            const yearSelect = document.getElementById('kiwiReportYear');
            if (yearSelect) {
                yearSelect.value = new Date().getFullYear();
                loadKiwiReport();
            }
        }
        
        function renderKiwiReportStats(summary) {
            const el = document.getElementById('kiwiReportStats');
            if (!el) return;
            const s = summary || {};
            el.innerHTML = `
                <div style="display:flex;gap:16px;flex-wrap:wrap;">
                    <div style="flex:1;min-width:140px;background:rgba(124,252,0,0.1);border:1px solid rgba(124,252,0,0.2);border-radius:10px;padding:16px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:#a855f7;">${(s['5斤装'] || {}).quantity || 0}</div>
                        <div style="font-size:12px;color:#94a3b8;margin-top:4px;">5斤装</div>
                    </div>
                    <div style="flex:1;min-width:140px;background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.2);border-radius:10px;padding:16px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:#06b6d4;">${(s['10斤装'] || {}).quantity || 0}</div>
                        <div style="font-size:12px;color:#94a3b8;margin-top:4px;">10斤装</div>
                    </div>
                    <div style="flex:1;min-width:140px;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.2);border-radius:10px;padding:16px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:#8b5cf6;">${s.total_quantity || 0}</div>
                        <div style="font-size:12px;color:#94a3b8;margin-top:4px;">总数量</div>
                    </div>
                    <div style="flex:1;min-width:140px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:10px;padding:16px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:#22c55e;">¥${(s.total_amount || 0).toFixed(2)}</div>
                        <div style="font-size:12px;color:#94a3b8;margin-top:4px;">总金额</div>
                    </div>
                </div>
            `;
        }

        function renderKiwiReport() {
            const container = document.getElementById('kiwiReportContent');
            if (!container) return;

            // 表头始终显示
            let html = '';
            html += `<div style="background:rgba(30,41,59,0.8);border-radius:12px;border:1px solid rgba(148,163,184,0.1);overflow:hidden;">`;
            html += `<table style="width:100%;border-collapse:collapse;">`;
            html += `<thead><tr style="background:rgba(15,23,42,0.5);">`;
            html += `<th style="padding:12px 16px;color:#94a3b8;font-size:15px;font-weight:700;text-align:center;border-bottom:1px solid rgba(148,163,184,0.1);width:16.67%;">序号</th>`;
            html += `<th style="padding:12px 16px;color:#94a3b8;font-size:15px;font-weight:700;text-align:left;border-bottom:1px solid rgba(148,163,184,0.1);width:16.67%;">姓名</th>`;
            html += `<th style="padding:12px 16px;color:#a855f7;font-size:15px;font-weight:700;text-align:center;border-bottom:1px solid rgba(148,163,184,0.1);width:16.67%;">5斤装</th>`;
            html += `<th style="padding:12px 16px;color:#06b6d4;font-size:15px;font-weight:700;text-align:center;border-bottom:1px solid rgba(148,163,184,0.1);width:16.67%;">10斤装</th>`;
            html += `<th style="padding:12px 16px;color:#8b5cf6;font-size:15px;font-weight:700;text-align:center;border-bottom:1px solid rgba(148,163,184,0.1);width:16.67%;">总数量</th>`;
            html += `<th style="padding:12px 16px;color:#22c55e;font-size:15px;font-weight:700;text-align:right;border-bottom:1px solid rgba(148,163,184,0.1);width:16.67%;">总金额</th>`;
            html += `</tr></thead>`;

            if (kiwiReportData.length === 0) {
                html += `<tbody><tr><td colspan="6" style="padding: 40px; text-align: center; color: #64748b; font-size: 14px;">暂无报表数据</td></tr></tbody>`;
            } else {
                // 计算规格汇总
                const specSummary = {};
                let totalGrandAmount = 0;

                kiwiReportData.forEach(item => {
                    const spec = item.remark || '未分类';
                    if (!specSummary[spec]) {
                        specSummary[spec] = {
                            quantity: 0,
                            amount: 0
                        };
                    }
                    specSummary[spec].quantity += item.total_quantity || 0;
                    specSummary[spec].amount += item.total_amount || 0;
                    totalGrandAmount += item.total_amount || 0;
                });

                // 按客户名分组汇总
                const grouped = {};
                kiwiReportData.forEach(item => {
                    if (!grouped[item.customer_name]) {
                        grouped[item.customer_name] = {
                            customer_name: item.customer_name,
                            items: [],
                            total_quantity: 0,
                            total_amount: 0
                        };
                    }
                    grouped[item.customer_name].items.push(item);
                    grouped[item.customer_name].total_quantity += item.total_quantity || 0;
                    grouped[item.customer_name].total_amount += item.total_amount || 0;
                });

                html += `<tbody>`;
                Object.values(grouped).forEach((customer, index) => {
                    let qty5 = 0, qty10 = 0;
                    customer.items.forEach(item => {
                        if (item.remark === '5斤装') qty5 += item.total_quantity || 0;
                        if (item.remark === '10斤装') qty10 += item.total_quantity || 0;
                    });
                    const bgColor = index % 2 === 0 ? 'transparent' : 'rgba(148,163,184,0.03)';
                    html += `<tr style="background:${bgColor};transition:background 0.2s;" onmouseover="this.style.background='rgba(96,165,250,0.1)'" onmouseout="this.style.background='${bgColor}'">`;
                    html += `<td style="padding:10px 16px;color:#94a3b8;font-size:14px;text-align:center;border-bottom:1px solid rgba(148,163,184,0.05);width:16.67%;">${index + 1}</td>`;
                    html += `<td style="padding:10px 16px;color:#e2e8f0;font-size:14px;text-align:left;border-bottom:1px solid rgba(148,163,184,0.05);width:16.67%;">${escapeHtml(customer.customer_name)}</td>`;
                    html += `<td style="padding:10px 16px;color:#a855f7;font-size:14px;text-align:center;border-bottom:1px solid rgba(148,163,184,0.05);font-weight:600;width:16.67%;">${qty5 || '-'}</td>`;
                    html += `<td style="padding:10px 16px;color:#06b6d4;font-size:14px;text-align:center;border-bottom:1px solid rgba(148,163,184,0.05);font-weight:600;width:16.67%;">${qty10 || '-'}</td>`;
                    html += `<td style="padding:10px 16px;color:#8b5cf6;font-size:14px;text-align:center;border-bottom:1px solid rgba(148,163,184,0.05);width:16.67%;">${customer.total_quantity}</td>`;
                    html += `<td style="padding:10px 16px;color:#22c55e;font-size:14px;text-align:right;border-bottom:1px solid rgba(148,163,184,0.05);width:16.67%;">¥${customer.total_amount.toFixed(2)}</td>`;
                    html += `</tr>`;
                });
                html += `</tbody>`;
            }

            html += `</table></div>`;

            // 添加分页控件（有数据时才显示）
            if (kiwiReportData.length > 0) {
                const totalPages = kiwiReportTotalPages || Math.ceil(kiwiReportTotalCustomers / kiwiReportPageSize || 1);
                html += `<div style="display:flex;align-items:center;gap:8px;padding:12px;background:rgba(30,41,59,0.5);border-radius:8px;border:1px solid rgba(148,163,184,0.1);">`;
                html += `<div style="display:flex;align-items:center;gap:8px;margin-right:12px;"><span style="color:#94a3b8;font-size:12px;">每页</span><select onchange="changeKiwiReportPageSize(this.value)" style="padding:4px 8px;border:1px solid rgba(148,163,184,0.2);border-radius:4px;background:rgba(30,41,59,0.8);color:#cbd5e1;font-size:12px;">`;
                [5,10,15].forEach(s => { html += `<option value="${s}" ${kiwiReportPageSize===s?'selected':''}>${s}</option>`; });
                html += `</select><span style="color:#94a3b8;font-size:12px;">条</span></div>`;

                if (totalPages > 1) {
                    html += `<button onclick="goToReportPage(1)" ${kiwiReportPage===1?'disabled':''} style="padding:6px 12px;border:1px solid rgba(148,163,184,0.2);background:rgba(30,41,59,0.8);color:#cbd5e1;border-radius:6px;cursor:pointer;font-size:12px;${kiwiReportPage===1?'opacity:0.5;cursor:not-allowed;':''}">首页</button>`;
                    html += `<button onclick="goToReportPage(${kiwiReportPage - 1})" ${kiwiReportPage === 1 ? 'disabled' : ''} style="padding:6px 12px;border:1px solid rgba(148,163,184,0.2);background:rgba(30,41,59,0.8);color:#cbd5e1;border-radius:6px;cursor:pointer;font-size:12px;${kiwiReportPage === 1 ? 'opacity:0.5;cursor:not-allowed;':''}">上一页</button>`;
                    const showPages = 5;
                    let startPage = Math.max(1, kiwiReportPage - Math.floor(showPages / 2));
                    let endPage = Math.min(totalPages, startPage + showPages - 1);
                    if (endPage - startPage < showPages - 1) startPage = Math.max(1, endPage - showPages + 1);
                    for (let i = startPage; i <= endPage; i++) {
                        html += `<button onclick="goToReportPage(${i})" style="padding:6px 12px;border:1px solid ${kiwiReportPage===i?'rgba(96,165,250,0.5)':'rgba(148,163,184,0.2)'};background:${kiwiReportPage===i?'rgba(96,165,250,0.15)':'rgba(30,41,59,0.8)'};color:${kiwiReportPage===i?'#60a5fa':'#cbd5e1'};border-radius:6px;cursor:pointer;font-size:12px;">${i}</button>`;
                    }
                    html += `<button onclick="goToReportPage(${kiwiReportPage + 1})" ${kiwiReportPage === totalPages ? 'disabled' : ''} style="padding:6px 12px;border:1px solid rgba(148,163,184,0.2);background:rgba(30,41,59,0.8);color:#cbd5e1;border-radius:6px;cursor:pointer;font-size:12px;${kiwiReportPage===totalPages?'opacity:0.5;cursor:not-allowed;':''}">下一页</button>`;
                    html += `<button onclick="goToReportPage(${totalPages})" ${kiwiReportPage === totalPages ? 'disabled' : ''} style="padding:6px 12px;border:1px solid rgba(148,163,184,0.2);background:rgba(30,41,59,0.8);color:#cbd5e1;border-radius:6px;cursor:pointer;font-size:12px;${kiwiReportPage===totalPages?'opacity:0.5;cursor:not-allowed;':''}">末页</button>`;
                    html += `<span style="color:#94a3b8;font-size:12px;margin-left:12px;">共 ${kiwiReportTotalCustomers} 个客户，第 ${kiwiReportPage}/${totalPages || 1} 页</span>`;
                    html += `</div>`;
                }
            }

            container.innerHTML = html;
        }
        
        function goToReportPage(page) {
            if (page < 1 || page > kiwiReportTotalPages) return;
            kiwiReportPage = page;
            loadKiwiReport();
        }
        
        function changeKiwiReportPageSize(size) {
            kiwiReportPageSize = parseInt(size, 10);
            kiwiReportPage = 1;
            loadKiwiReport();
        }
        
        function toggleSelectAllKiwiSales(source) {
            const checkboxes = document.querySelectorAll('.kiwi-sales-checkbox');
            checkboxes.forEach(cb => cb.checked = source.checked);
            updateKiwiSalesDeleteButton();
        }
        
        function updateKiwiSalesDeleteButton() {
            const checkboxes = document.querySelectorAll('.kiwi-sales-checkbox:checked');
            const count = checkboxes.length;
            const deleteBtn = document.getElementById('deleteKiwiSalesBtn');
            
            if (count > 0) {
                deleteBtn.style.display = 'inline-block';
                deleteBtn.textContent = `删除选中 (${count})`;
            } else {
                deleteBtn.style.display = 'none';
            }
        }
        
        async function deleteSelectedKiwiSales() {
            const checkedBoxes = document.querySelectorAll('.kiwi-sales-checkbox:checked');
            const saleIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
            
            if (saleIds.length === 0) {
                alert('请先选择要删除的订单');
                return;
            }
            
            if (!confirm(`确定要删除这 ${saleIds.length} 条订单吗？`)) {
                return;
            }
            
            try {

        async function saveKiwiSale(event) {
            if (window._submitting) return;
            window._submitting = true;
            try {
                event.preventDefault();
            
            // 表单验证
            const customerName = _$('kiwiCustomerName').value.trim();
            const phone = _$('kiwiPhone').value.trim();
            const address = _$('kiwiAddress').value.trim();
            const orderDate = _$('kiwiOrderDate').value;

            const trackingNumber = _$('kiwiTrackingNumber').value.trim();

            const paymentAmount = parseFloat(_$('kiwiPaymentAmount').value);

                alert('客户名不能超过50个字符');
                _$('kiwiCustomerName').focus();
                return;
            }
            
            // 电话校验
            if (!phone) {
                alert('请输入电话号码');
                _$('kiwiPhone').focus();
                return;
            }
            if (!/^\d{11}$/.test(phone)) {
                alert('请输入有效的11位手机号码');
                _$('kiwiPhone').focus();
                return;
            }
            
            // 地址校验
            if (!address) {
                alert('请输入收货地址');
                _$('kiwiAddress').focus();
                return;
            }
            if (address.length > 200) {
                alert('地址不能超过200个字符');
                _$('kiwiAddress').focus();
                return;
            }
            
            // 接单日期校验
            if (!orderDate) {
                alert('请选择接单日期');
                _$('kiwiOrderDate').focus();
                return;
            }

            

            
            // 运单号校验
            if (trackingNumber && trackingNumber.length > 50) {
                alert('运单号不能超过50个字符');
                _$('kiwiTrackingNumber').focus();
                return;
            }
            
            // 构建数据

                customer_name: customerName,

                address: address,

                status: status,

                remark: remark,
                quantity: quantity,
                payment_amount: paymentAmount
            };
            
            try {
                const url = id ? `${API_URL}/kiwi-sales/${id}` : `${API_URL}/kiwi-sales`;

            try {
                const res = await fetchWithTimeout(
                    `${API_URL}/expenses/today?date=${encodeURIComponent(date)}`,
                    { headers: getAuthHeaders() }
                );
                if (!res.ok) throw new Error('today stats failed');
                const data = await res.json();
                if (labelEl) labelEl.textContent = data.date;
                if (totalEl) totalEl.textContent = parseFloat(data.total).toFixed(2);
                if (countEl) countEl.textContent = data.count;

            updateExpenseDeleteBtn();
            const selectAll = document.getElementById('selectAllExpense');

                    method: 'POST',
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },

        async function exportExpenses() {
            const exportBtn = document.querySelector('button[onclick="exportExpenses()"]');
            const originalText = exportBtn ? exportBtn.textContent : '';
            try {
                let url = `${API_URL}/expenses/export`;
                let method = 'GET';
                let body = null;
                let headers = { ...getAuthHeaders() };
                
                if (selectedExpenseIds.size > 0) {
                    // 如果有选中的记录，使用POST方法导出指定记录
                    method = 'POST';
                    headers['Content-Type'] = 'application/json';
                    body = JSON.stringify({ ids: Array.from(selectedExpenseIds) });
                    if (!confirm(`确定要导出选中的 ${selectedExpenseIds.size} 条记录吗？`)) return;
                } else {
                    // 如果没有选中，导出当前所选日期的记录
                    if (!expenseDateFilter) expenseDateFilter = todayLocalISO();
                    url += `?date=${encodeURIComponent(expenseDateFilter)}`;
                    if (expenseCategoryFilter) {
                        url += `&category=${encodeURIComponent(expenseCategoryFilter)}`;
                    }
                    if (!confirm(`确定要导出 ${expenseDateFilter} 的消费记录吗？`)) return;
                }

                if (exportBtn) {
                    exportBtn.textContent = '导出中...';
                    exportBtn.disabled = true;
                }

                const response = await fetchWithTimeout(url, { method, headers, body });
                if (!response.ok) throw new Error('导出失败');
                
                // 处理文件下载
                const blob = await response.blob();
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = '消费记录.csv';
                if (contentDisposition) {
                    const filenameMatch = contentDisposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
                    if (filenameMatch && filenameMatch[1]) {
                        filename = filenameMatch[1].replace(/['"]/g, '');
                    }
                }
                
                // 创建下载链接
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(downloadUrl);
                
                // 恢复按钮
                if (exportBtn) {
                    exportBtn.textContent = originalText;
                    exportBtn.disabled = false;
                }

                alert('导出成功！');
            } catch (error) {
                if (exportBtn) {
                    exportBtn.textContent = originalText;
                    exportBtn.disabled = false;
                }
                alert(error.message);
            }
        }

        async function renderExpenseStatsTrend(data) {
            const el = document.getElementById('expenseStatsTrend');
            if (!el) return;
            try {
                let url = `${API_URL}/expenses/stats/monthly?year=${data._year || new Date().getFullYear()}`;
                if (data._startMonth) url += `&start_month=${data._startMonth}`;
                if (data._endMonth) url += `&end_month=${data._endMonth}`;
                const resp = await fetchWithTimeout(url, { headers: getAuthHeaders() });
                if (!resp.ok) throw new Error('加载月度数据失败');
                const mData = await resp.json();
                const months = mData.months || [];
                if (months.length === 0) {
                    el.innerHTML = '';
                    return;
                }
                const maxVal = Math.max(...months.map(m => m.total), 1);
                const chartW = 700, chartH = 220, padL = 60, padR = 20, padT = 30, padB = 40;
                const plotW = chartW - padL - padR, plotH = chartH - padT - padB;
                const barW = Math.min(40, plotW / months.length * 0.6);
                const gap = (plotW - barW * months.length) / (months.length + 1);
                let bars = '', labels = '', gridLines = '';
                const gridCount = 4;
                for (let i = 0; i <= gridCount; i++) {
                    const y = padT + plotH - (plotH * i / gridCount);
                    const val = (maxVal * i / gridCount).toFixed(0);
                    gridLines += `<line x1="${padL}" y1="${y}" x2="${chartW - padR}" y2="${y}" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>`;
                    gridLines += `<text x="${padL - 8}" y="${y + 4}" text-anchor="end" fill="#64748b" font-size="10">¥${val}</text>`;
                }
                months.forEach((m, i) => {
                    const x = padL + gap + i * (barW + gap);
                    const h = maxVal > 0 ? (m.total / maxVal) * plotH : 0;
                    const y = padT + plotH - h;
                    const color = m.total >= maxVal * 0.8 ? '#ef4444' : m.total >= maxVal * 0.5 ? '#f97316' : '#14b8a6';
                    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="3" fill="${color}" opacity="0.85">
                        <title>${parseInt(m.month)}月: ¥${m.total.toFixed(2)}</title>
                    </rect>`;
                    bars += `<text x="${x + barW / 2}" y="${y - 6}" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">¥${m.total.toFixed(0)}</text>`;
                    labels += `<text x="${x + barW / 2}" y="${chartH - 10}" text-anchor="middle" fill="#94a3b8" font-size="11">${parseInt(m.month)}月</text>`;
                });
                let html = '<div style="background:rgba(30,41,59,0.8);border-radius:12px;border:1px solid rgba(148,163,184,0.1);padding:20px;">';
                html += '<div style="font-size:14px;font-weight:600;color:#94a3b8;margin-bottom:16px;"><i class="fa fa-line-chart" style="color:#14b8a6;margin-right:6px;"></i>月度消费趋势</div>';
                html += `<div style="overflow-x:auto;"><svg viewBox="0 0 ${chartW} ${chartH}" style="width:100%;max-width:${chartW}px;height:auto;">`;
                html += gridLines + bars + labels;
                html += '</svg></div></div>';
                el.innerHTML = html;
            } catch (e) {
                console.error('加载月度趋势失败:', e);
                el.innerHTML = '<div class="error-message">加载月度趋势失败</div>';
            }
        }

        function onTimeChange(select, hiddenId) {
            const picker = select.closest('.time-picker');

            const hour = hourSelect.value;
            const minute = minuteSelect.value;

        function setTimePickerValue(pickerId, timeValue) {
            const hiddenInput = document.getElementById(pickerId);
            if (!hiddenInput) return;

            if (!picker) return;
            const hourSelect = picker.querySelector('.time-hour');
            const minuteSelect = picker.querySelector('.time-minute');

            if (timeValue && timeValue.includes(':')) {
                const [hour, minute] = timeValue.split(':');
                hourSelect.value = hour;
                minuteSelect.value = minute;

            } else {

        function calcOvertimeDuration() {
            if (isManualDuration) return;
            const hint = document.getElementById('overtimeDurationHint');
            if (hint) hint.textContent = '自动计算';
            const type = _$('overtimeType').value;
            const start = getTimePickerValue('overtimeStartTime');
            const end = getTimePickerValue('overtimeEndTime');
            const durationEl = _$('overtimeDuration');
            if (!end) { durationEl.value = ''; return; }
            let diffMin;
            if (type === 'weekday') {
                const base = new Date('2000-01-01T19:00');
                const e = new Date('2000-01-01T' + end);
                diffMin = (e - base) / 60000;
            } else {
                if (!start) { durationEl.value = ''; return; }
                diffMin = (new Date('2000-01-01T' + end) - new Date('2000-01-01T' + start)) / 60000;
                const s = new Date('2000-01-01T' + start);
                const e = new Date('2000-01-01T' + end);
                const ls = new Date('2000-01-01T12:00');
                const le = new Date('2000-01-01T14:00');
                if (s < le && e > ls) {
                    const os = s > ls ? s : ls;
                    const oe = e < le ? e : le;
                    diffMin -= (oe - os) / 60000;
                }
            }
            if (diffMin <= 0) { durationEl.value = '时间无效'; return; }
            durationEl.value = (diffMin / 60).toFixed(1) + ' 小时';
        }

        async function saveOvertimeRecord(event) {
            if (window._submitting) return;
            window._submitting = true;
            try {
                event.preventDefault();
                const id = document.getElementById('overtimeRecordId').value;
            const durationText = _$('overtimeDuration').value.trim();
            const data = {
                overtime_type: _$('overtimeType').value,
                date: _$('overtimeDate').value,
                start_time: getTimePickerValue('overtimeStartTime'),
                end_time: getTimePickerValue('overtimeEndTime'),
                remark: _$('overtimeRemark').value.trim()
            };
            const parsed = parseFloat(durationText);
            if (!isNaN(parsed) && parsed > 0) {
                data.duration = parsed;
            }
            if (!data.date) { alert('请选择日期'); return; }
            if (!data.start_time) { alert('请填写开始时间'); return; }
            if (!data.end_time) { alert('请填写结束时间'); return; }
            if (data.end_time <= data.start_time) {
                alert('结束时间必须晚于开始时间');
                return;
            }
            try {
                const url = id ? `${API_URL}/overtime/${id}` : `${API_URL}/overtime`;
                const method = id ? 'PUT' : 'POST';
                const response = await fetchWithTimeout(url, {
                    method,
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '保存失败');
                closeOvertimeModal();
                loadOvertimeRecords();
                loadOvertimeCount();
                alert(id ? '更新成功' : '添加成功');
            } catch (error) {
                alert(error.message);
            }
            } finally {
                window._submitting = false;
            }
        }

                                    }
                                    
                                    setTimeout(() => {
                                        document.addEventListener('click', closeDropdown);
                                    }, 100);
                                },
                                className: 'fa fa-code',
                                title: '代码块'
                            },
                            'quote', 'unordered-list', 'ordered-list', '|',
                            'link', 'image', 'table', '|',
                            'preview', 'side-by-side', 'fullscreen', '|',
                            'guide'
                        ],
                        placeholder: '在这里写下你的内容...',
                        renderingConfig: {
                            codeSyntaxHighlighting: true
                        },
                        markedOptions: {
                            breaks: true,
                            gfm: true,
                            highlight: function(code, lang) {
                                // 先转义 HTML 特殊字符，防止 XSS
                                function escapeHtml(str) {
                                    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                                }
                                code = escapeHtml(code);
                                // 简单的语法高亮
                                if (!lang) return code;
                                
                                // 针对不同语言的高亮
                                if (lang === 'python') {
                                    code = code
                                        // 关键字
                                        .replace(/\b(def|class|import|from|if|elif|else|for|while|try|except|finally|return|print|pass|break|continue|with|as|lambda|and|or|not|in|is|True|False|None)\b/g, '<span style="color: #f472b6;">$1</span>')
                                        // 字符串
                                        .replace(/(['"])(?:\\.|[^\\])*?\1/g, '<span style="color: #fbbf24;">$&</span>')
                                        // 注释
                                        .replace(/#.*$/gm, '<span style="color: #64748b; font-style: italic;">$&</span>')
                                        // 数字
                                        .replace(/\b\d+\b/g, '<span style="color: #34d399;">$&</span>')
                                        // 函数名
                                        .replace(/\bdef\s+(\w+)/g, 'def <span style="color: #60a5fa;">$1</span>')
                                        // 类名
                                        .replace(/\bclass\s+(\w+)/g, 'class <span style="color: #60a5fa;">$1</span>');
                                } else if (lang === 'javascript' || lang === 'js') {
                                    code = code
                                        // 关键字
                                        .replace(/\b(var|let|const|function|if|else|for|while|do|switch|case|default|break|continue|return|try|catch|finally|throw|new|this|typeof|instanceof|in|of|from|import|export|async|await)\b/g, '<span style="color: #f472b6;">$1</span>')
                                        // 字符串
                                        .replace(/(['"])(?:\\.|[^\\])*?\1/g, '<span style="color: #fbbf24;">$&</span>')
                                        // 注释
                                        .replace(/\/\/.*$/gm, '<span style="color: #64748b; font-style: italic;">$&</span>')
                                        .replace(/\/\*[\s\S]*?\*\//g, '<span style="color: #64748b; font-style: italic;">$&</span>')
                                        // 数字
                                        .replace(/\b\d+\b/g, '<span style="color: #34d399;">$&</span>')
                                        // 函数名
                                        .replace(/\bfunction\s+(\w+)/g, 'function <span style="color: #60a5fa;">$1</span>')
                                        // 方法调用
                                        .replace(/(\w+)\s*\(/g, '<span style="color: #60a5fa;">$1</span>(');
                                } else if (lang === 'html') {
                                    code = code
                                        // 标签
                                        .replace(/<(\w+)/g, '<span style="color: #f472b6;">&lt;$1</span>')
                                        .replace(/<\/(\w+)>/g, '<span style="color: #f472b6;">&lt;/$1&gt;</span>')
                                        // 属性
                                        .replace(/(\w+)\s*=/g, '<span style="color: #60a5fa;">$1</span>=')
                                        // 属性值
                                        .replace(/=(['"])(?:\\.|[^\\])*?\1/g, '=<span style="color: #fbbf24;">$&</span>')
                                        // 注释
                                        .replace(/<!--[\s\S]*?-->/g, '<span style="color: #64748b; font-style: italic;">$&</span>');
                                } else if (lang === 'css') {
                                    code = code
                                        // 选择器
                                        .replace(/([.#]?[\w-]+)\s*\{/g, '<span style="color: #f472b6;">$1</span>{')
                                        // 属性
                                        .replace(/(\w+)\s*:/g, '<span style="color: #60a5fa;">$1</span>:')
                                        // 值
                                        .replace(/:\s*([^;]+);/g, ': <span style="color: #fbbf24;">$1</span>;')
                                        // 注释
                                        .replace(/\/\*[\s\S]*?\*\//g, '<span style="color: #64748b; font-style: italic;">$&</span>');
                                }
                                
                                return code;
                            },
                            langPrefix: 'language-'  
                        },
                        codemirrorOptions: {
                            lineNumbers: true,
                            lineWrapping: true,
                            matchBrackets: true,
                            autoCloseBrackets: true,
                            extraKeys: {
                                'Ctrl-Space': 'autocomplete'
                            },
                            // 启用语法高亮
                            gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
                            foldGutter: true,

        /**
         * 通用文章保存函数
         * @param {number} isDraft - 是否为草稿 (0=发布, 1=草稿)
         */
        async function saveArticleCommon(isDraft) {
            if (window._submitting) return;
            window._submitting = true;
            try {
                const titleElement = _$('articleTitle');
                const categoryElement = _$('articleCategory');
                const tagsElement = _$('articleTags');
                const contentElement = _$('articleContent');
                const idElement = document.getElementById('articleId');

                const article = {
                    title: titleElement ? (titleElement.value.trim() || (isDraft ? '无标题' : '')) : (isDraft ? '无标题' : ''),
                    category: categoryElement ? categoryElement.value : '未分类',
                    tags: tagsElement ? tagsElement.value.trim() : '',
                    content: easyMDE ? easyMDE.value() : (contentElement ? contentElement.value.trim() : ''),
                    is_draft: isDraft
                };
                const id = idElement ? idElement.value : '';

                if (!isDraft) {
                    if (!article.title) {
                        alert('请输入' + articleTerm(article.category) + '标题');
                        return;
                    }
                    if (!article.content) {
                        alert('请填写内容');
                        return;
                    }
                }

                const response = await fetchWithTimeout(id ? `${API_URL}/articles/${id}` : `${API_URL}/articles`, {
                    method: id ? 'PUT' : 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify(article)
                });
                if (!response.ok) {
                    throw new Error(`请求失败，状态码: ${response.status}`);
                }

                closeModal();
                if (easyMDE) easyMDE.toTextArea();
                easyMDE = null;
                await Promise.all([loadArticles(), loadCategories(), loadStats()]);

                alert(isDraft ? '草稿保存成功！' : (id ? articleTerm(article.category) + '更新成功！' : articleTerm(article.category) + '保存成功！'));
            } catch (error) {
                console.error('保存文章失败:', error);
                alert(isDraft ? '保存草稿失败，请稍后重试' : '保存失败，请稍后重试');
                if (error.message.includes('401')) {
                    checkAuth();
                }
            } finally {
                window._submitting = false;
            }
        }

        async function saveArticle(event) {
            await saveArticleCommon(0);
        }

        async function saveDraft() {
            await saveArticleCommon(1);
        }

        async function deleteArticle(id, event) {
            if (event) event.stopPropagation();
            const cached = renderedArticlesCache.find(a => String(a.id) === String(id));
            const category = cached ? cached.category : currentCategory;
            if (!confirm('确定要删除这篇' + articleTerm(category) + '吗？')) return;
            try {
                const response = await fetchWithTimeout(`${API_URL}/articles/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });

                if (!response.ok) {
                    throw new Error('删除文章失败');
                }

                if (renderedArticlesCache.length === 1 && currentPage > 1) {
                    currentPage--;
                }

                await Promise.all([loadArticles(), loadCategories(), loadStats()]);

                // 清除选中状态，隐藏删除按钮
                const selectAllCheckbox = document.getElementById('selectAllCheckbox');
                if (selectAllCheckbox) selectAllCheckbox.checked = false;
                const checkboxes = document.querySelectorAll('.article-checkbox');
                checkboxes.forEach(cb => cb.checked = false);
                updateSelectedCount();

                alert(articleTerm(category) + '删除成功！');
            } catch (error) {
                console.error('删除文章失败:', error);
                alert('删除失败，请稍后重试');
            }
        }

        function updateSelectedCount() {
            const checkedBoxes = document.querySelectorAll('.article-checkbox:checked');
            const count = checkedBoxes.length;
            const deleteBtn = document.getElementById('deleteSelectedBtn');
            
            if (count > 0) {

        async function deleteSelectedArticles() {
            const checkedBoxes = document.querySelectorAll('.article-checkbox:checked');
            const articleIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
            
            if (articleIds.length === 0) {
                alert('请先选择要删除的' + articleTerm(currentCategory));
                return;
            }

            if (!confirm(`确定要删除这 ${articleIds.length} 篇${articleTerm(currentCategory)}吗？`)) {
                return;
            }
            
            try {
                const response = await fetchWithTimeout(`${API_URL}/articles/batch-delete`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify({ ids: articleIds })
                });
                const result = await response.json();
                
                if (response.ok) {
                    if (renderedArticlesCache.length === articleIds.length && currentPage > 1) {
                        currentPage--;
                    }
                    await Promise.all([loadArticles(), loadCategories(), loadStats()]);
                    
                    // 清除选中状态，隐藏删除按钮
                    const selectAllCheckbox = document.getElementById('selectAllCheckbox');
                    if (selectAllCheckbox) selectAllCheckbox.checked = false;
                    const checkboxes = document.querySelectorAll('.article-checkbox');
                    checkboxes.forEach(cb => cb.checked = false);
                    updateSelectedCount();
                    
                    alert(`成功删除 ${result.deleted} 篇${articleTerm(currentCategory)}！`);
                } else {
                    throw new Error(result.error || '删除文章失败');
                }
            } catch (error) {
                console.error('删除文章失败:', error);
                alert('删除失败，请稍后重试');
                checkAuth();
            }
        }

        function insertImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const headers = getAuthHeaders();
                    // 移除Content-Type，让浏览器自动设置
                    delete headers['Content-Type'];
                    
                    const response = await fetchWithTimeout(`${API_URL}/upload`, {
                        method: 'POST',
                        headers: headers,
                        body: formData
                    });
                    const result = await response.json();
                    if (result.url) {
                        const imageMarkdown = `![${file.name}](${result.url})`;
                        if (easyMDE) {
                            easyMDE.value(easyMDE.value() + imageMarkdown);
                        } else {
                            _$('articleContent').value += imageMarkdown;
                        }
                    }
                } catch (error) {
                    console.error('上传图片失败:', error);
                    alert('上传图片失败，请稍后重试');
                }
            };
            input.click();
        }

        function insertCodeBlock(language) {
            const codeBlock = `\n\`\`\`${language}\n你的代码在这里\n\`\`\`\n`;
            if (easyMDE) {
                const currentValue = easyMDE.value();
                const cursorPosition = easyMDE.codemirror.getCursor();
                
                // 在光标位置插入代码块
                const newValue = currentValue.substring(0, easyMDE.codemirror.indexFromPos(cursorPosition)) + 
                               codeBlock + 
                               currentValue.substring(easyMDE.codemirror.indexFromPos(cursorPosition));
                
                easyMDE.value(newValue);
                easyMDE.codemirror.focus();
                
                // 计算新的光标位置
                const lines = codeBlock.split('\n');
                const newLine = cursorPosition.line + 1; // 代码块第一行后的位置
                const newCh = 4; // 缩进位置
                
                easyMDE.codemirror.setCursor({line: newLine, ch: newCh});
            } else {
                _$('articleContent').value += codeBlock;
            }
        }
