[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --tb=line --strict-markers
markers =
    p0: 核心冒烟用例（发版必跑，100% 通过）
    p1: 重要用例（回归测试，通过率 ≥ 95%）
    p2: 次要用例（UI/边界/性能）
    smoke: 冒烟测试（快速反馈）
    regression: 回归测试
    security: 安全测试（鉴权/越权/注入/限流）
    performance: 性能测试（响应时间基线）
    fault_tolerance: 容错测试（异常输入/边界/协议错误）
    ui: UI 端到端测试（Playwright）
